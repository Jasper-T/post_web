services:
  webui-backend:
    image: webui-backend:latest
    container_name: webui-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.io/library}
        PYTHON_IMAGE_TAG: ${PYTHON_IMAGE_TAG:-3.12-slim}
    working_dir: /workspace/project
    command: >
      sh -c "uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    environment:
      PYTHONPATH: /workspace/project
      FUXING_DATA_ROOT: /data/fuxing
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: /data/fuxing/logs
      LOG_ROTATION: ${LOG_ROTATION:-10 MB}
      LOG_RETENTION: ${LOG_RETENTION:-14 days}
    volumes:
      - ./:/workspace/project
      - ${FUXING_DATA_DIR:-./data}:/data/fuxing
      - D:/works/projects/00_datasets/:/data/datasets/
    ports:
      - "8000:8000"
    restart: unless-stopped

  webui-frontend:
    image: webui-frontend:latest
    container_name: webui-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-docker.io/library}
    depends_on:
      - webui-backend
    ports:
      - "5173:80"
    restart: unless-stopped
